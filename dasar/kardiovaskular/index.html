<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kardiovaskular | Fisiologi Veteriner</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #0C1A3A;
            --card-bg: #162E61;
            --text-main: #FFFFFF;
            --text-muted: #93C5FD;
            --accent-blue: #63B3ED;
            --border-color: #25468A;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0;
        }

        header {
            padding: 3rem 2rem;
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .back-btn {
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            transition: color 0.2s;
        }

        .back-btn:hover { color: var(--accent-blue); }

        main { max-width: 900px; margin: 0 auto; padding: 2rem; }

        .unit-header { margin-bottom: 3rem; }
        
        h1 { font-size: 2rem; margin: 0.5rem 0; }

        .sim-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .sim-item {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }

        .sim-item:hover {
            border-color: var(--accent-blue);
            background: #1E3B7D;
            transform: translateX(8px);
        }

        .sim-info h3 { margin: 0; font-size: 1.1rem; }
        .sim-info p { margin: 0.25rem 0 0; color: var(--text-muted); font-size: 0.9rem; }

        .go-icon { color: var(--accent-blue); }
    </style>
</head>
<body>

    <main>
        <a href="../../index.html" class="back-btn">
            <i data-lucide="arrow-left" size="18"></i> Kembali ke Beranda
        </a>

        <div class="unit-header">
            <p style="color: var(--accent-blue); margin: 0; font-weight: 600;">UNIT PRAKTIKUM</p>
            <h1>Sistem Kardiovaskular</h1>
            <p style="color: var(--text-muted);">Pilih modul simulasi di bawah ini untuk memulai eksperimen digital.</p>
        </div>

        <div class="sim-list">
            <a href="pulsus-ekg.html" class="card sim-item">
                <div class="sim-info">
                    <h3>Simulasi 1: Pulsus dan EKG</h3>
                    <p>Simulasi menghitung pulsus dan membaca hasil EKG</p>
                </div>
                <div class="go-icon"><i data-lucide="play-circle"></i></div>
            </a>

            <a href="simulasi-sinapsis.html" class="card sim-item">
                <div class="sim-info">
                    <h3>Simulasi 2: Dummy text</h3>
                    <p>Dummy text</p>
                </div>
                <div class="go-icon"><i data-lucide="play-circle"></i></div>
            </a>
            
            <a href="simulasi-kontraksi-otot.html" class="card sim-item">
                <div class="sim-info">
                    <h3>Simulasi 3: Dummy text</h3>
                    <p>Dummy text</p>
                </div>
                <div class="go-icon"><i data-lucide="play-circle"></i></div>
            </a>
        </div>
    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
